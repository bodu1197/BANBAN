<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <ellipse cx="200" cy="60" rx="40" ry="50" data-part="head" class="body-part"/>
  <!-- Neck -->
  <rect x="185" y="108" width="30" height="22" rx="5" data-part="neck" class="body-part"/>
  <!-- Shoulders + Chest area -->
  <path d="M140 130 Q200 120 260 130 L280 145 Q260 140 200 138 Q140 140 120 145 Z" data-part="shoulder" class="body-part"/>
  <!-- Chest -->
  <rect x="145" y="140" width="110" height="70" rx="15" data-part="chest" class="body-part"/>
  <!-- Belly -->
  <rect x="155" y="210" width="90" height="80" rx="10" data-part="belly" class="body-part"/>
  <!-- Left Upper Arm -->
  <rect x="95" y="140" width="45" height="90" rx="20" data-part="upper-arm-left" class="body-part"/>
  <!-- Right Upper Arm -->
  <rect x="260" y="140" width="45" height="90" rx="20" data-part="upper-arm-right" class="body-part"/>
  <!-- Left Forearm -->
  <rect x="80" y="235" width="40" height="100" rx="18" data-part="forearm-left" class="body-part"/>
  <!-- Right Forearm -->
  <rect x="280" y="235" width="40" height="100" rx="18" data-part="forearm-right" class="body-part"/>
  <!-- Left Hand -->
  <ellipse cx="95" cy="355" rx="18" ry="22" data-part="hand-left" class="body-part"/>
  <!-- Right Hand -->
  <ellipse cx="305" cy="355" rx="18" ry="22" data-part="hand-right" class="body-part"/>
  <!-- Hip area -->
  <path d="M155 290 Q200 285 245 290 L250 320 Q200 325 150 320 Z" data-part="hip" class="body-part"/>
  <!-- Left Thigh -->
  <rect x="150" y="320" width="48" height="130" rx="22" data-part="thigh-left" class="body-part"/>
  <!-- Right Thigh -->
  <rect x="202" y="320" width="48" height="130" rx="22" data-part="thigh-right" class="body-part"/>
  <!-- Left Calf -->
  <rect x="152" y="460" width="42" height="140" rx="18" data-part="calf-left" class="body-part"/>
  <!-- Right Calf -->
  <rect x="206" y="460" width="42" height="140" rx="18" data-part="calf-right" class="body-part"/>
  <!-- Left Ankle -->
  <rect x="158" y="600" width="30" height="30" rx="10" data-part="ankle-left" class="body-part"/>
  <!-- Right Ankle -->
  <rect x="212" y="600" width="30" height="30" rx="10" data-part="ankle-right" class="body-part"/>
  <!-- Left Foot -->
  <ellipse cx="173" cy="650" rx="22" ry="18" data-part="foot-left" class="body-part"/>
  <!-- Right Foot -->
  <ellipse cx="227" cy="650" rx="22" ry="18" data-part="foot-right" class="body-part"/>
</svg>
