<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="5;url=https://banunni.com">
  <title>반언니 도메인 변경 안내</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 2rem;
      letter-spacing: -0.5px;
    }
    .logo span { color: #e94560; }
    .notice {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .new-domain {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }
    .new-domain:hover, .new-domain:focus-visible {
      background: #c73652;
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
    .countdown {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }
    .countdown span {
      color: #e94560;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">반<span>언니</span></div>
    <div class="notice">
      <h1>도메인이 변경되었습니다</h1>
      <p>
        반언니의 새로운 주소는<br>
        <strong>banunni.com</strong> 입니다.<br>
        북마크를 업데이트 해주세요.
      </p>
      <a href="https://banunni.com" class="new-domain">banunni.com 으로 이동</a>
      <div class="countdown"><span id="sec">5</span>초 후 자동으로 이동합니다</div>
    </div>
  </div>
  <script>
    let t = 5;
    const el = document.getElementById('sec');
    const timer = setInterval(function() {
      t--;
      el.textContent = t;
      if (t <= 0) {
        clearInterval(timer);
        window.location.href = 'https://banunni.com';
      }
    }, 1000);
  </script>
</body>
</html>
