<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="robots" content="noindex,nofollow" />
  <title>오프라인 — 반언니</title>
  <link rel="icon" href="/icon-192.png" type="image/png" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      background:#ffffff;color:#0a0a0a;padding:24px;text-align:center}
    .icon{width:96px;height:96px;margin-bottom:24px;border-radius:18px;
      background:linear-gradient(135deg,#c33c00,#a33100);display:flex;align-items:center;justify-content:center;
      color:#ffffff;font-size:36px;font-weight:800;letter-spacing:-1px}
    h1{font-size:20px;margin:0 0 8px;font-weight:700;letter-spacing:-0.5px}
    p{margin:0 0 24px;font-size:14px;color:#737373;line-height:1.6;max-width:320px}
    button{padding:12px 28px;border:none;border-radius:10px;background:#c33c00;color:#ffffff;font-size:14px;
      font-weight:600;cursor:pointer;transition:background-color .15s}
    button:hover,button:focus-visible{background:#a33100}
    button:focus-visible{outline:2px solid #c33c00;outline-offset:2px}
    .sub{margin-top:16px;font-size:12px;color:#a1a1a1}
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">반</div>
  <h1>인터넷에 연결할 수 없습니다</h1>
  <p>네트워크 상태를 확인한 뒤 다시 시도해 주세요. 캐시된 페이지는 계속 이용 가능합니다.</p>
  <button type="button" onclick="location.reload()">다시 시도</button>
  <p class="sub">반언니 · banunni.com</p>
</body>
</html>
